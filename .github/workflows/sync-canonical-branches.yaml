name: Sync canonical branches

on:
  push:
    branches:
      - master
    tags:
      - v1.9.*
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  sync-master-to-canonical-main:
    name: Merge master into canonical/main
    if: github.event_name != 'push' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout canonical/main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: canonical/main

      - name: Configure git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "worker@org.com"

      - name: Merge master into canonical/main and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin master canonical/main

          git checkout canonical/main
          git merge --no-ff --no-edit origin/master

          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            git push origin canonical/main
          fi

  sync-v1-9-tags-to-canonical-v1-9:
    name: Merge v1.9.x tags into canonical/v1.9
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v1.9.')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout canonical/v1.9
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: canonical/v1.9

      - name: Configure git
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "worker@org.com"

      - name: Merge new v1.9.x tags into canonical/v1.9 and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags origin canonical/v1.9

          git checkout -B canonical/v1.9 origin/canonical/v1.9

          mapfile -t release_tags < <(git tag -l 'v1.9.*' | grep -E '^v1\.9\.[0-9]+$' | sort -V)

          if [[ ${#release_tags[@]} -eq 0 ]]; then
            echo "No v1.9.x tags found."
            exit 0
          fi

          changed=false
          for tag in "${release_tags[@]}"; do
            if git merge-base --is-ancestor "${tag}^{commit}" HEAD; then
              echo "${tag} is already included in canonical/v1.9"
              continue
            fi

            echo "Merging ${tag} into canonical/v1.9"
            git merge --no-ff --no-edit "${tag}^{commit}"
            changed=true
          done

          if [[ "$changed" == "true" ]]; then
            git push origin canonical/v1.9
          else
            echo "No new v1.9.x tags to merge."
          fi
