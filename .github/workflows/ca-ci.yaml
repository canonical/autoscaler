name: Cluster Autoscaler Verify

on:
  pull_request:
    paths:
      - "cluster-autoscaler/**"
  push:
    branches:
      - master
      - "canonical/*"
    paths:
      - "cluster-autoscaler/**"
  workflow_dispatch: {}

env:
  GOPATH: ${{ github.workspace }}/go

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.GOPATH }}/src/k8s.io/autoscaler

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler/go.mod
          cache-dependency-path: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: --timeout=30m
          working-directory: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler

  verify-vendor:
    name: Verify vendor directory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.GOPATH }}/src/k8s.io/autoscaler

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler/go.mod
          cache-dependency-path: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler/go.sum

      - name: Check module vendoring
        working-directory: ${{ env.GOPATH }}/src/k8s.io/autoscaler/cluster-autoscaler
        run: |
          go mod tidy
          go mod vendor
          test -z "$(git status --porcelain)" || (echo "please run 'go mod tidy && go mod vendor', and submit your changes"; exit 1)
